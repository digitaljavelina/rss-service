<aside class="w-64 min-h-screen bg-base-200 flex flex-col">
  <div class="p-6">
    <h1 class="text-xl font-bold">RSS Service</h1>
  </div>

  <nav class="flex-1">
    <ul class="menu">
      <li><a href="/" class="active">Dashboard</a></li>
      <li><a href="/feeds">My Feeds</a></li>
      <li><a href="/create">Create Feed</a></li>
      <li><a href="/settings">Settings</a></li>
    </ul>
  </nav>

  <div class="p-4">
    <button
      x-data
      @click="$store.theme.toggle()"
      class="btn btn-ghost btn-block"
      type="button"
    >
      <span x-show="$store.theme.current === 'light'">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.354 15.354A9 9 0 018.646 3.646 9.003 9.003 0 0012 21a9.003 9.003 0 008.354-5.646z" />
        </svg>
        Dark Mode
      </span>
      <span x-show="$store.theme.current === 'dark'">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364 6.364l-.707-.707M6.343 6.343l-.707-.707m12.728 0l-.707.707M6.343 17.657l-.707.707M16 12a4 4 0 11-8 0 4 4 0 018 0z" />
        </svg>
        Light Mode
      </span>
    </button>
  </div>
</aside>
